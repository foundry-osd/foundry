name: Stale Issues & PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark Stale Issues & PRs
    runs-on: ubuntu-slim

    permissions:
      issues: write

    steps:
      - name: Mark stale waiting issues
        uses: actions/stale@v10
        with:
          # Only process issues waiting for user feedback
          only-labels: 'status: waiting-for-user'

          # Issue settings
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            We are waiting for additional information on this issue.

            This issue has been automatically marked as **stale** because there has been no response for **7 days**.

            It will be closed in **7 days** if no further activity occurs.

            If this issue is still relevant, please add a comment with the requested information.

            Thank you for your contribution.

          close-issue-message: |
            This issue has been automatically closed because we did not receive the requested information.

            If the issue is still relevant, feel free to reopen it or create a new issue with updated details.

          # Labels to exempt from stale
          exempt-issue-labels: 'pinned,security,blocked'

          # Only stale issues
          days-before-pr-stale: -1

          # Remove stale label when there is new activity
          remove-stale-when-updated: true

          # Operations per run
          operations-per-run: 100
