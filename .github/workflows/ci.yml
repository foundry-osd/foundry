name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            runner: windows-latest
          - platform: ARM64
            runner: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('src/**/*.csproj', 'src/Directory.Build.props', 'global.json', 'NuGet.config', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nuget-

      - name: Restore solution
        run: dotnet restore .\src\Foundry.slnx --nologo

      - name: Build solution
        run: dotnet build .\src\Foundry.slnx -c Release -p:Platform=${{ matrix.platform }} -p:ContinuousIntegrationBuild=true --no-restore --nologo

      - name: Run unit tests
        run: dotnet test .\src\Foundry.slnx -c Release -p:Platform=${{ matrix.platform }} --no-build --nologo
