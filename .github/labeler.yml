# Auto-labeler configuration for Foundry
# https://github.com/actions/labeler

# Foundry desktop application
'project: foundry':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/Foundry/**'

# Foundry deployment application
'project: foundry-deploy':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/Foundry.Deploy/**'

# Foundry WinPE network bootstrap application
'project: foundry-connect':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/Foundry.Connect/**'

# UI assets and views
ui:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.xaml'
          - 'src/Foundry/ViewModels/**'
          - 'src/Foundry/Converters/**'
          - 'src/Foundry/Assets/**'
          - 'src/Foundry.Deploy/ViewModels/**'
          - 'src/Foundry.Deploy/Converters/**'
          - 'src/Foundry.Connect/ViewModels/**'
          - 'src/Foundry.Connect/Converters/**'
          - 'src/Foundry.Connect/Assets/**'

# Tests
tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**/*.Tests/**'
          - 'src/**/TestInfrastructure/**'
          - 'src/**/Integration/**'
          - 'src/**/Unit/**'

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

# Dependencies and project metadata
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/Directory.Build.props'
          - 'src/Directory.Build.targets'
          - 'src/**/*.csproj'

# CI / automation
ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

# Repo configuration
config:
  - changed-files:
      - any-glob-to-any-file:
          - '.editorconfig'
          - '.gitignore'
          - 'src/.editorconfig'
          - 'src/settings.xamlstyler'
          - '.vscode/**'
